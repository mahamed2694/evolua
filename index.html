<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Evolua</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet"/>
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;Evolua&quot;,&quot;short_name&quot;:&quot;Evolua&quot;,&quot;start_url&quot;:&quot;/&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%230a0e1a&quot;,&quot;theme_color&quot;:&quot;%234ade80&quot;,&quot;icons&quot;:[{&quot;src&quot;:&quot;data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230a0e1a'/><text y='.9em' font-size='80'>💪</text></svg>&quot;,&quot;sizes&quot;:&quot;any&quot;,&quot;type&quot;:&quot;image/svg+xml&quot;}]}"/>
<meta name="theme-color" content="#0a0e1a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0a0e1a;--bg2:#111827;--bg3:#1a2235;
  --card:#141c2e;--card2:#1e2a40;--border:#2a3650;
  --accent:#4ade80;--accent2:#22d3ee;--accent3:#f59e0b;
  --accent4:#f87171;--accent5:#a78bfa;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;
  --r:16px;--rs:10px;--shadow:0 4px 24px rgba(0,0,0,.4);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
body{overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg)}
/* ONBOARD */
.ob{min-height:100vh;display:flex;flex-direction:column}
.ob-hdr{padding:56px 28px 24px}
.ob-logo{font-family:'Syne',sans-serif;font-size:34px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-1px}
.ob-tag{font-size:13px;color:var(--text3);margin-top:3px}
.ob-prog{display:flex;gap:6px;padding:0 28px 12px}
.ob-dot{height:4px;border-radius:4px;background:var(--border);transition:all .3s;flex:1}
.ob-dot.a{background:var(--accent);flex:2}.ob-dot.d{background:var(--accent2)}
.ob-step{flex:1;padding:0 28px 36px;display:flex;flex-direction:column;gap:18px;animation:fadeUp .35s ease}
.ob-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:700;line-height:1.2}
.ob-title span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ob-sub{font-size:13px;color:var(--text2);line-height:1.65}
/* FORM */
.fld{display:flex;flex-direction:column;gap:7px}
.fld label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.fld input,.fld select{background:var(--card2);border:1.5px solid var(--border);border-radius:var(--rs);padding:13px 15px;font-size:15px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;width:100%;appearance:none}
.fld input:focus,.fld select:focus{border-color:var(--accent)}
.fld input::placeholder{color:var(--text3)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* BUTTONS */
.btn{padding:15px 22px;border-radius:var(--rs);font-size:15px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;border:none;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-p{background:linear-gradient(135deg,var(--accent),#16a34a);color:#0a0e1a}
.btn-p:active{transform:scale(.98);opacity:.9}
.btn-s{background:var(--card2);color:var(--text2);border:1.5px solid var(--border)}
.btn-g{background:transparent;color:var(--text2);padding:11px}
.btn-ic{width:42px;height:42px;padding:0;border-radius:50%;background:var(--card2);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .2s}
.btn-ic:active{transform:scale(.94)}
.btn-w{width:100%}
.btn-danger{background:rgba(248,113,113,.1);color:var(--accent4);border:1.5px solid rgba(248,113,113,.2)}
/* NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(14,20,38,.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:6px 0 env(safe-area-inset-bottom,8px);display:flex;z-index:100}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:7px 4px;cursor:pointer;transition:all .2s;border:none;background:transparent}
.ni .ico{font-size:21px;transition:transform .2s}
.ni .lbl{font-size:10px;color:var(--text3);font-family:'DM Sans',sans-serif;font-weight:500}
.ni.active .lbl{color:var(--accent)}
.ni.active .ico{transform:scale(1.1)}
.ni-c .nadd{width:50px;height:50px;background:linear-gradient(135deg,var(--accent),#16a34a);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;color:#0a0e1a;font-weight:700;box-shadow:0 4px 20px rgba(74,222,128,.4);margin-top:-14px;border:none;cursor:pointer;transition:transform .2s}
.ni-c .nadd:active{transform:scale(.92)}
/* MAIN */
.main{padding:0 0 88px}
.page{animation:fadeUp .28s ease}
/* HEADER */
.phdr{padding:52px 20px 14px;display:flex;align-items:flex-start;justify-content:space-between}
.phdr-t{font-family:'Syne',sans-serif;font-size:23px;font-weight:700}
.phdr-s{font-size:12px;color:var(--text3);margin-top:2px}
/* DASH */
.greet{padding:52px 20px 6px}
.greet-n{font-family:'Syne',sans-serif;font-size:22px;font-weight:700}
.greet-n span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.greet-d{font-size:11px;color:var(--text3);margin-top:2px}
/* CARDS */
.card{margin:10px 20px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px}
.card-sm{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;margin-bottom:7px}
.ctitle{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px}
/* CHECKIN */
.ci-items{display:flex;gap:7px}
.ci-item{flex:1;background:var(--bg3);border-radius:var(--rs);padding:9px 6px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:1.5px solid transparent;transition:all .2s;min-height:72px;justify-content:center}
.ci-item.done{border-color:var(--accent);background:rgba(74,222,128,.07)}
.ci-item{border-color:rgba(74,222,128,.15)}
.ci-ic{font-size:19px}
.ci-lbl{font-size:9px;color:var(--text3);font-weight:500}
.ci-val{font-size:11px;font-weight:700;color:var(--text)}
/* MACRO RING */
.macro-wrap{display:flex;gap:14px;align-items:center}
.ring-wrap{position:relative;width:108px;height:108px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-ctr{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-cal{font-family:'Syne',sans-serif;font-size:20px;font-weight:800}
.ring-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.mbars{flex:1;display:flex;flex-direction:column;gap:9px}
.mbar{display:flex;flex-direction:column;gap:3px}
.mbar-top{display:flex;justify-content:space-between}
.mbar-n{font-size:11px;color:var(--text2);font-weight:500}
.mbar-v{font-size:10px;color:var(--text3)}
.mbar-track{height:5px;background:var(--bg3);border-radius:4px;overflow:hidden}
.mbar-fill{height:100%;border-radius:4px;transition:width .6s ease}
/* INSIGHTS */
.ins{margin:0 20px 10px;border-radius:var(--r);padding:13px 15px;display:flex;gap:11px;border:1px solid}
.ins.g{background:rgba(74,222,128,.05);border-color:rgba(74,222,128,.18)}
.ins.b{background:rgba(34,211,238,.05);border-color:rgba(34,211,238,.18)}
.ins.y{background:rgba(245,158,11,.05);border-color:rgba(245,158,11,.18)}
.ins.r{background:rgba(248,113,113,.05);border-color:rgba(248,113,113,.18)}
.ins-ico{font-size:21px;flex-shrink:0;margin-top:1px}
.ins-t{font-size:13px;font-weight:600;margin-bottom:3px}
.ins-m{font-size:12px;color:var(--text2);line-height:1.5}
/* SECTION */
.sec{margin:0 20px 10px}
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.sec-t{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.sec-a{font-size:12px;color:var(--accent);font-weight:500;cursor:pointer;background:none;border:none}
/* MEAL */
.meal{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;margin-bottom:7px;display:flex;align-items:center;gap:11px;cursor:pointer;transition:background .15s}
.meal:active{background:var(--card2)}
.meal-ico{font-size:22px;width:38px;text-align:center}
.meal-info{flex:1}
.meal-n{font-size:14px;font-weight:600}
.meal-mac{font-size:11px;color:var(--text3);margin-top:1px}
.meal-cal{font-size:13px;font-weight:700;color:var(--accent3)}
/* PASSOS */
.passos-num{font-family:'Syne',sans-serif;font-size:28px;font-weight:800}
.passos-meta{font-size:11px;color:var(--text3)}
.passos-badge{font-size:10px;padding:4px 10px;background:rgba(34,211,238,.1);color:var(--accent2);border-radius:20px;font-weight:600}
.ptrack{height:7px;background:var(--bg3);border-radius:7px;overflow:hidden;margin:10px 0 7px}
.pfill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:7px;transition:width .8s ease}
.pmsg{font-size:12px;color:var(--text2);line-height:1.5}
/* PLACAR */
.placar-dias{display:flex;gap:5px}
.pd{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.pd-lbl{font-size:9px;color:var(--text3)}
.pd-dot{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px}
.pd-dot.g{background:rgba(74,222,128,.18);color:var(--accent)}
.pd-dot.y{background:rgba(245,158,11,.18);color:var(--accent3)}
.pd-dot.v{background:var(--bg3);color:var(--text3)}
.pd-dot.h{border:2px solid var(--accent2)}
/* SHEET */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;backdrop-filter:blur(4px);animation:fadeIn .2s ease}
.sheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg2);border-radius:22px 22px 0 0;border-top:1px solid var(--border);z-index:201;animation:slideUp .28s ease;max-height:92vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom,18px)}
.sh{width:38px;height:4px;background:var(--border);border-radius:4px;margin:11px auto 0}
.shdr{padding:14px 20px 11px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.shdr-t{font-family:'Syne',sans-serif;font-size:17px;font-weight:700}
.sbody{padding:18px 20px;display:flex;flex-direction:column;gap:15px}
/* SEARCH */
.srch-wrap{position:relative}
.srch{background:var(--card2);border:1.5px solid var(--border);border-radius:var(--rs);padding:13px 15px 13px 42px;font-size:15px;color:var(--text);width:100%;outline:none;font-family:'DM Sans',sans-serif}
.srch:focus{border-color:var(--accent2)}
.srch-ic{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:17px;color:var(--text3);pointer-events:none}
.sres{display:flex;flex-direction:column;gap:3px;max-height:260px;overflow-y:auto}
.si{padding:11px 13px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background .12s}
.si:active{background:var(--card2)}
.si-n{font-size:14px;color:var(--text);font-weight:500}
.si-c{font-size:12px;color:var(--accent3);font-weight:600}
.si-m{font-size:10px;color:var(--text3);margin-top:1px}
/* QTD */
.qty-wrap{display:flex;align-items:center;gap:11px}
.qty-btn{width:38px;height:38px;border-radius:50%;background:var(--card2);border:1.5px solid var(--border);font-size:20px;color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:700}
.qty-inp{flex:1;background:var(--card2);border:1.5px solid var(--accent2);border-radius:var(--rs);padding:11px;text-align:center;font-size:22px;font-weight:700;color:var(--text);outline:none;font-family:'Syne',sans-serif}
.qprev{background:var(--bg3);border-radius:var(--rs);padding:11px 15px;display:flex;justify-content:space-between}
.qprev-item{display:flex;flex-direction:column;align-items:center;gap:2px}
.qprev-v{font-size:14px;font-weight:700}
.qprev-l{font-size:10px;color:var(--text3)}
/* HUMOR */
.humor-row{display:flex;gap:7px}
.hbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:11px 6px;background:var(--card2);border:2px solid var(--border);border-radius:var(--rs);cursor:pointer;transition:all .2s}
.hbtn.sel{border-color:var(--accent);background:rgba(74,222,128,.07)}
.hbtn span:first-child{font-size:21px}
.hbtn span:last-child{font-size:10px;color:var(--text3)}
/* TREINO */
.tr-tabs{display:flex;gap:7px;margin-bottom:14px;overflow-x:auto;padding-bottom:3px}
.tr-tabs::-webkit-scrollbar{display:none}
.tr-tab{padding:7px 15px;background:var(--card);border:1.5px solid var(--border);border-radius:20px;font-size:13px;font-weight:600;color:var(--text2);white-space:nowrap;cursor:pointer;transition:all .2s;flex-shrink:0}
.tr-tab.active{background:rgba(74,222,128,.1);border-color:var(--accent);color:var(--accent)}
.tr-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:10px}
.tr-nm{font-family:'Syne',sans-serif;font-size:15px;font-weight:700;margin-bottom:11px}
.tr-badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600}
.tr-badge.ativo{background:rgba(74,222,128,.14);color:var(--accent)}
.tr-badge.novo{background:rgba(167,139,250,.14);color:var(--accent5)}
.ex-row{display:flex;align-items:flex-start;gap:9px;padding:9px 10px;background:var(--bg3);border-radius:8px;margin-bottom:5px;cursor:pointer;transition:background .15s}
.ex-row:active{background:var(--card2)}
.ex-num{width:20px;height:20px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px}
.ex-info{flex:1}
.ex-nm{font-size:13px;color:var(--text);font-weight:500}
.ex-dica{font-size:11px;color:var(--text3);margin-top:2px;line-height:1.4}
.ex-sets{font-size:11px;color:var(--text3);white-space:nowrap;margin-top:2px}
.tr-sug{margin-top:9px;padding:10px;background:rgba(167,139,250,.07);border:1px solid rgba(167,139,250,.18);border-radius:8px;font-size:12px;color:var(--accent5);line-height:1.5}
/* MODAL EXERCÍCIO */
.ex-modal-imgs{display:flex;gap:8px;margin-bottom:14px}
.ex-img-wrap{flex:1;aspect-ratio:4/3;border-radius:var(--rs);overflow:hidden;background:var(--bg3);border:1px solid var(--border);position:relative}
.ex-img-wrap img{width:100%;height:100%;object-fit:cover}
.ex-img-lbl{position:absolute;bottom:6px;left:0;right:0;text-align:center;font-size:10px;color:var(--text2);background:rgba(0,0,0,.5);padding:2px 0}
.ex-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:32px}
/* CIGARRO */
.cig-ctrl{display:flex;align-items:center;justify-content:space-between;background:var(--bg3);border-radius:var(--rs);padding:14px 16px}
.cig-num{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--text)}
.cig-btns{display:flex;gap:10px}
.cig-btn{width:40px;height:40px;border-radius:50%;border:1.5px solid var(--border);background:var(--card2);font-size:22px;font-weight:700;color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer}
/* EVENTO ESPECIAL */
.ev-textarea{background:var(--card2);border:1.5px solid var(--border);border-radius:var(--rs);padding:13px 15px;font-size:14px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;width:100%;resize:none;min-height:90px;line-height:1.6}
.ev-textarea:focus{border-color:var(--accent)}
.ev-result{background:var(--bg3);border-radius:var(--rs);padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.ev-result-title{font-size:13px;font-weight:600;color:var(--text)}
.ev-result-item{font-size:12px;color:var(--text2);line-height:1.6;display:flex;gap:8px}
/* PROFILE */
.prof-hdr{padding:52px 20px 20px;display:flex;flex-direction:column;align-items:center;gap:10px}
.prof-av{width:76px;height:76px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#0a0e1a}
.prof-nm{font-family:'Syne',sans-serif;font-size:21px;font-weight:700}
.prof-stats{display:flex;gap:22px}
.pstat{display:flex;flex-direction:column;align-items:center;gap:2px}
.pstat-v{font-family:'Syne',sans-serif;font-size:20px;font-weight:700}
.pstat-l{font-size:10px;color:var(--text3)}
.pitem{display:flex;justify-content:space-between;align-items:center;padding:13px 15px;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:5px;cursor:pointer}
.pitem-l{display:flex;align-items:center;gap:11px}
.pitem-ic{font-size:17px;width:34px;height:34px;background:var(--bg3);border-radius:9px;display:flex;align-items:center;justify-content:center}
.pitem-n{font-size:14px;font-weight:500}
.pitem-v{font-size:12px;color:var(--text3)}
/* PILL */
.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.pill-g{background:rgba(74,222,128,.1);color:var(--accent)}
.pill-b{background:rgba(34,211,238,.1);color:var(--accent2)}
.pill-y{background:rgba(245,158,11,.1);color:var(--accent3)}
.pill-r{background:rgba(248,113,113,.1);color:var(--accent4)}
.pill-p{background:rgba(167,139,250,.1);color:var(--accent5)}
/* PESO CHART */
.mini-chart{display:flex;align-items:flex-end;gap:3px;height:46px}
.mini-bar{flex:1;background:var(--accent2);border-radius:3px 3px 0 0;opacity:.55;min-height:3px}
.mini-bar.last{opacity:1;background:var(--accent)}
/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px}
.loading-logo{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:pulse 1.5s ease infinite}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;gap:11px;padding:36px 20px;text-align:center}
.empty-ic{font-size:44px;opacity:.45}
.empty-t{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;color:var(--text2)}
.empty-s{font-size:12px;color:var(--text3);line-height:1.6}
/* TOAST */

function calcPrevisaoPeso(usuario, historicoSemana){
  // historicoSemana: array de {cal, passos, treino} dos últimos 7 dias
  if(!historicoSemana||historicoSemana.length<3)return null;
  const mediaCalConsumida=historicoSemana.reduce((s,d)=>s+(d.cal||0),0)/historicoSemana.length;

function calcNovoMetabolismo(usuario, pesagens, historicoSemana){
  if(pesagens.length<2||!historicoSemana||historicoSemana.length<5)return null;
  const pesoAtual=pesagens[0].peso;
  const pesoAnterior=pesagens.find((p,i)=>i>0&&p.peso!==pesoAtual)?.peso;
  if(!pesoAnterior)return null;
  const previsao=calcPrevisaoPeso(usuario,historicoSemana);
  if(!previsao)return null;
  const variacaoReal=pesoAtual-pesoAnterior;
  const variacaoPrevista=previsao.variacaoPeso;
  const desvio=variacaoReal-variacaoPrevista;
  // Se desvio > 0.3kg: metabolismo mais lento → reduzir calorias
  // Se desvio < -0.3kg e objetivo recomposição: pode estar perdendo músculo → aumentar
  if(Math.abs(desvio)<0.2)return null; // dentro do esperado, sem sugestão
  const ajuste=desvio>0?-Math.round(desvio*1000/7):-Math.round(desvio*800/7);
  const novaMetaCal=Math.max(1600,Math.min(3000,usuario.meta_calorica+ajuste));
  const novaMetaProt=Math.round(pesoAtual*2.0);
  // Recomposição: peso sobe = pode ser músculo (bom!), alertar diferente
  const ehMusculos=usuario.objetivo==='recomposicao'&&variacaoReal>0&&variacaoReal<0.5;
  return{
    ajuste,novaMetaCal,novaMetaProt,

  };

// CALCULAR STREAK
function calcStreak(checkins){
  if(!checkins||checkins.length===0)return 0;
  const datas=checkins.map(c=>c.data).sort().reverse();
  let streak=0;
  let dataRef=new Date();
  dataRef.setHours(0,0,0,0);
  for(const data of datas){
    const d=new Date(data+'T12:00:00');
    const diff=Math.round((dataRef-d)/(1000*60*60*24));
    if(diff<=1){streak++;dataRef=d;}
    else break;
  }
  return streak;
}

// CALCULAR SUGESTÃO PROTEICA
function calcSugestaoProt(usuario,refeicoes,calBebida){
  const totalCal=refeicoes.reduce((s,r)=>s+(r.calorias_total||0),0)+calBebida;
  const totalProt=refeicoesData.reduce((s,r)=>s+(r.proteina_total||0),0);
  const restaProt=Math.max(0,usuario.meta_proteina-totalProt);
  const excCal=Math.max(0,totalCal-usuario.meta_calorica);
  if(restaProt<10)return null; // já bateu proteína
  // Opções com melhor ratio proteína/caloria
  const opcoes=[
    {nome:'Whey protein (30g + 200ml leite desnatado)',prot:32,cal:195,ic:'🥛'},
    {nome:'Frango desfiado (150g)',prot:48,cal:239,ic:'🍗'},
    {nome:'Claras de ovo (3 unidades)',prot:33,cal:144,ic:'🥚'},
    {nome:'Atum em lata (1 lata 120g)',prot:29,cal:150,ic:'🐟'},
    {nome:'Iogurte proteico (200g)',prot:20,cal:120,ic:'🥣'},
    {nome:'Sardinha em óleo (1 lata 125g)',prot:30,cal:260,ic:'🐟'},
  ].filter(o=>o.prot>=restaProt*0.4) // filtra os que ajudam pelo menos 40% da meta
   .sort((a,b)=>(b.prot/b.cal)-(a.prot/a.cal)) // ordena por melhor ratio
   .slice(0,3);
  return{restaProt:restaProt.toFixed(0),excCal:Math.round(excCal),opcoes};
}

          fibra_100g:(n.fiber_100g||0).toFixed(1),
          codigo_barras:codigo,
        });
        showToast('Produto encontrado! ✅');
        setModo('manual');
      } else {
        showToast('Produto não encontrado. Preencha manualmente.','e');
        setF('codigo_barras',codigo);
        setModo('manual');
      }
    } catch(e){ showToast('Erro ao buscar. Preencha manualmente.','e'); setModo('manual'); }
    setCarregando(false);
  };

  const iniciarScan=async()=>{
    setScanning(true);
    try{
      const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
      streamRef.current=stream;
      if(videoRef.current){videoRef.current.srcObject=stream;videoRef.current.play();}
      // BarcodeDetector API
      if('BarcodeDetector' in window){
        const detector=new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e','code_128','qr_code']});
        let ativo=true;
        const scanLoop=async()=>{
          while(ativo&&streamRef.current){
            try{
              if(videoRef.current&&videoRef.current.readyState>=2){
                const codes=await detector.detect(videoRef.current);
                if(codes.length>0){
                  ativo=false;
                  pararScan();
                  await buscarOFF(codes[0].rawValue);
                  return;
                }
              }
            } catch(e){}
            await new Promise(r=>setTimeout(r,300));
          }
        };
        // Aguarda vídeo carregar antes de iniciar
        videoRef.current.onloadedmetadata=()=>scanLoop();
        setTimeout(()=>{if(ativo)scanLoop();},1000);
      } else {
        // Fallback: input manual
        pararScan();
        const cod=prompt('BarcodeDetector não suportado. Digite o código de barras:');
        if(cod)await buscarOFF(cod);
      }
    } catch(e){ showToast('Sem acesso à câmera.','e'); setScanning(false); }
  };

  const pararScan=()=>{
    if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}
    setScanning(false);
  };

  useEffect(()=>()=>pararScan(),[]);

  const salvar=async()=>{
    if(!form.nome||!form.calorias_100g){showToast('Nome e calorias são obrigatórios.','e');return;}
    const{error}=await sb.from('alimentos').insert([{
      usuario_id:usuario.id,
      nome:form.nome,marca:form.marca||null,
      calorias_100g:+form.calorias_100g,
      proteina_100g:+form.proteina_100g||0,
      carboidrato_100g:+form.carboidrato_100g||0,
      gordura_100g:+form.gordura_100g||0,
      fibra_100g:+form.fibra_100g||0,
      codigo_barras:form.codigo_barras||null,
      is_publico:false,fonte:'usuario',
    }]);
    if(error){showToast('Erro ao salvar.','e');return;}
    showToast('Alimento cadastrado! ✅');
    onSave();onClose();
  };

  return(<>
    <div className="overlay" onClick={onClose}/>
    <div className="sheet">
      <div className="sh"/>
      <div className="shdr"><span className="shdr-t">➕ Novo alimento</span><button className="btn-ic" onClick={onClose} style={{fontSize:'13px',color:'var(--text3)'}}>✕</button></div>
      <div className="sbody">
        <button className="scan-btn" onClick={scanning?pararScan:iniciarScan} disabled={carregando}>
          <span>{scanning?'⏹':'📷'}</span>
          <span>{carregando?'Buscando produto...':(scanning?'Parar câmera':'Ler código de barras')}</span>
        </button>
        {scanning&&<div className="scan-video-wrap"><video ref={videoRef} playsInline muted/><div className="scan-line"/></div>}
        {scanning&&<div className="scan-status">Aponte a câmera para o código de barras do produto</div>}
        {!scanning&&<div style={{height:'1px',background:'var(--border)',margin:'4px 0'}}/>}
        <div className="fld"><label>Nome do alimento *</label><input placeholder="Ex: Whey protein chocolate" value={form.nome} onChange={e=>setF('nome',e.target.value)}/></div>
        <div className="fld"><label>Marca (opcional)</label><input placeholder="Ex: Optimum Nutrition" value={form.marca} onChange={e=>setF('marca',e.target.value)}/></div>
        <div className="fld"><label>Código de barras (opcional)</label><input placeholder="Ex: 7891234567890" value={form.codigo_barras} onChange={e=>setF('codigo_barras',e.target.value)}/></div>
        <div style={{fontSize:'11px',color:'var(--text3)',marginTop:'-8px'}}>Valores por 100g ou 100ml</div>
        <div className="frow">
          <div className="fld"><label>Calorias (kcal) *</label><input type="number" placeholder="370" value={form.calorias_100g} onChange={e=>setF('calorias_100g',e.target.value)}/></div>
          <div className="fld"><label>Proteína (g)</label><input type="number" placeholder="85" value={form.proteina_100g} onChange={e=>setF('proteina_100g',e.target.value)}/></div>
        </div>
        <div className="frow">
          <div className="fld"><label>Carboidratos (g)</label><input type="number" placeholder="5" value={form.carboidrato_100g} onChange={e=>setF('carboidrato_100g',e.target.value)}/></div>
          <div className="fld"><label>Gorduras (g)</label><input type="number" placeholder="2" value={form.gordura_100g} onChange={e=>setF('gordura_100g',e.target.value)}/></div>
        </div>
        <div className="fld"><label>Fibras (g) — opcional</label><input type="number" placeholder="0" value={form.fibra_100g} onChange={e=>setF('fibra_100g',e.target.value)}/></div>
        <button className="btn btn-p btn-w" onClick={salvar} style={{opacity:form.nome&&form.calorias_100g?1:.45}}>Salvar alimento ✓</button>
      </div>
    </div>
  </>);
}

// CADASTRO RECEITA
function CadastroReceitaModal({usuario,onClose,onSave,showToast}){
  const [step,setStep]=useState('info'); // info | ingredientes | confirmar
  const [nome,setNome]=useState('');
  const [porcoes,setPorcoes]=useState(1);
  const [busca,setBusca]=useState('');
  const [resultados,setResultados]=useState([]);
  const [ingredientes,setIngredientes]=useState([]); // {alimento, quantidade_g}
  const [qtdTemp,setQtdTemp]=useState(100);
  const [selTemp,setSelTemp]=useState(null);
  const timer=useRef(null);

  const buscar=async q=>{
    if(q.length<2){setResultados([]);return;}
    const{data}=await sb.from('alimentos').select('*').ilike('nome',`%${q}%`).limit(20);
    setResultados(data||[]);
  };
  useEffect(()=>{clearTimeout(timer.current);timer.current=setTimeout(()=>buscar(busca),280);},[busca]);

  const addIngr=(al,g)=>{
    setIngredientes(p=>[...p,{alimento:al,quantidade_g:g}]);
    setSelTemp(null);setBusca('');setResultados([]);setQtdTemp(100);
  };
  const remIngr=idx=>setIngredientes(p=>p.filter((_,i)=>i!==idx));

  // Calcular totais
  const totais=ingredientes.reduce((acc,i)=>{
    const m=calcM(i.alimento,i.quantidade_g);
    return{cal:acc.cal+m.cal,prot:acc.prot+m.prot,carb:acc.carb+m.carb,gord:acc.gord+m.gord};
  },{cal:0,prot:0,carb:0,gord:0});
  const pesoTotal=ingredientes.reduce((s,i)=>s+i.quantidade_g,0);
  const porPorcao={cal:Math.round(totais.cal/porcoes),prot:+(totais.prot/porcoes).toFixed(1),carb:+(totais.carb/porcoes).toFixed(1),gord:+(totais.gord/porcoes).toFixed(1)};
  const pesoPorcao=Math.round(pesoTotal/porcoes);

  const salvar=async()=>{
    if(!nome||ingredientes.length===0){showToast('Adicione nome e pelo menos 1 ingrediente.','e');return;}
    // Salvar receita
    const{data:rec,error}=await sb.from('receitas').insert([{
      usuario_id:usuario.id,nome,porcoes,
      peso_total_g:pesoTotal,
      calorias_total:totais.cal,proteina_total:totais.prot,
      carboidrato_total:totais.carb,gordura_total:totais.gord,
    }]).select('id').single();
    if(error||!rec){showToast('Erro ao salvar receita.','e');return;}
    // Salvar ingredientes
    await sb.from('receita_ingredientes').insert(ingredientes.map(i=>({receita_id:rec.id,alimento_id:i.alimento.id,quantidade_g:i.quantidade_g})));
    // Criar alimento "virtual" para facilitar busca
    await sb.from('alimentos').insert([{
      usuario_id:usuario.id,
      nome:`🍳 ${nome}`,
      calorias_100g:Math.round(totais.cal/pesoTotal*100),
      proteina_100g:+(totais.prot/pesoTotal*100).toFixed(1),
      carboidrato_100g:+(totais.carb/pesoTotal*100).toFixed(1),
      gordura_100g:+(totais.gord/pesoTotal*100).toFixed(1),
      is_publico:false,fonte:'receita',
    }]);
    showToast('Receita salva! 🍳');
    onSave();onClose();
  };

  return(<>
    <div className="overlay" onClick={onClose}/>
    <div className="sheet" style={{maxHeight:'95vh'}}>
      <div className="sh"/>
      <div className="shdr"><span className="shdr-t">🍳 Nova receita</span><button className="btn-ic" onClick={onClose} style={{fontSize:'13px',color:'var(--text3)'}}>✕</button></div>
      <div className="sbody">
        <div className="step-tabs">
          {[['info','1. Info'],['ingredientes','2. Ingredientes'],['confirmar','3. Confirmar']].map(([v,l])=>(
            <div key={v} className={`step-tab ${step===v?'active':''}`} onClick={()=>v!=='confirmar'||ingredientes.length>0?setStep(v):null}>{l}</div>
          ))}
        </div>

        {step==='info'&&<>
          <div className="fld"><label>Nome da receita *</label><input placeholder="Ex: Pastel de frango airfryer" value={nome} onChange={e=>setNome(e.target.value)} autoFocus/></div>
          <div className="fld"><label>Quantas porções rende?</label>
            <div className="qty-wrap">
              <button className="qty-btn" onClick={()=>setPorcoes(p=>Math.max(1,p-1))}>−</button>
              <input className="qty-inp" type="number" value={porcoes} onChange={e=>setPorcoes(Math.max(1,+e.target.value))}/>
              <button className="qty-btn" onClick={()=>setPorcoes(p=>p+1)}>+</button>
            </div>
          </div>
          <div style={{background:'var(--bg3)',borderRadius:'var(--rs)',padding:'12px 14px',fontSize:'12px',color:'var(--text2)',lineHeight:1.6}}>
            💡 Ex: Pastel rende 4 unidades → porcoes=4. Ao adicionar no dia, você escolhe quantas unidades comeu.
          </div>
          <button className="btn btn-p btn-w" onClick={()=>nome?setStep('ingredientes'):null} style={{opacity:nome?1:.45}}>Próximo →</button>
        </>}

        {step==='ingredientes'&&<>
          {!selTemp&&<>
            <div className="srch-wrap"><span className="srch-ic">🔍</span><input className="srch" placeholder="Buscar ingrediente..." value={busca} onChange={e=>setBusca(e.target.value)} autoFocus/></div>
            {resultados.length>0&&<div className="sres">{resultados.map(a=>(
              <div key={a.id} className="si" onClick={()=>{setSelTemp(a);setQtdTemp(100);}}>
                <div><div className="si-n">{a.nome}</div><div className="si-m">P:{a.proteina_100g}g · C:{a.carboidrato_100g}g</div></div>
                <div className="si-c">{a.calorias_100g}<span style={{fontSize:'10px',color:'var(--text3)'}}>kcal</span></div>
              </div>
            ))}</div>}
          </>}
          {selTemp&&<>
            <div style={{padding:'10px 13px',background:'var(--bg3)',borderRadius:'var(--rs)',fontSize:'14px',fontWeight:600}}>{selTemp.nome}</div>
            <div className="fld"><label>Quantidade usada na receita (g)</label>
              <div className="qty-wrap">
                <button className="qty-btn" onClick={()=>setQtdTemp(q=>Math.max(1,q-5))}>−</button>
                <input className="qty-inp" type="number" value={qtdTemp} onChange={e=>setQtdTemp(+e.target.value)}/>
                <button className="qty-btn" onClick={()=>setQtdTemp(q=>q+5)}>+</button>
              </div>
            </div>
            <div style={{display:'flex',gap:'9px'}}>
              <button className="btn btn-s" style={{flex:1}} onClick={()=>{setSelTemp(null);setBusca('');}}>← Voltar</button>
              <button className="btn btn-p" style={{flex:2}} onClick={()=>addIngr(selTemp,qtdTemp)}>Adicionar ✓</button>
            </div>
          </>}

          {ingredientes.length>0&&<>
            <div style={{fontSize:'11px',color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.8px',marginTop:'4px'}}>Ingredientes ({ingredientes.length})</div>
            {ingredientes.map((ingr,i)=>(
              <div key={i} className="ingr-row">
                <div className="ingr-nm">{ingr.alimento.nome}</div>
                <div className="ingr-g">{ingr.quantidade_g}g</div>
                <button className="ingr-del" onClick={()=>remIngr(i)}>✕</button>
              </div>
            ))}
            <button className="btn btn-p btn-w" onClick={()=>setStep('confirmar')}>Ver resumo →</button>
          </>}
        </>}

        {step==='confirmar'&&<>
          <div style={{background:'var(--bg3)',borderRadius:'var(--rs)',padding:'12px 14px',marginBottom:'4px'}}>
            <div style={{fontSize:'15px',fontWeight:700,marginBottom:'6px'}}>🍳 {nome}</div>
            <div style={{fontSize:'12px',color:'var(--text3)'}}>{porcoes} porção(ões) · {pesoPorcao}g cada</div>
          </div>
          <div className="receita-total">
            <div style={{fontSize:'11px',color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.8px',marginBottom:'9px'}}>Por porção ({pesoPorcao}g)</div>
            <div style={{display:'flex',gap:'12px'}}>
              {[['🔥','Calorias',porPorcao.cal,'kcal'],['💪','Proteína',porPorcao.prot,'g'],['⚡','Carbs',porPorcao.carb,'g'],['🥑','Gordura',porPorcao.gord,'g']].map(([ic,l,v,u])=>(
                <div key={l} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:'2px',flex:1}}>
                  <div style={{fontSize:'14px',fontWeight:700}}>{v}<span style={{fontSize:'10px',color:'var(--text3)'}}>{u}</span></div>
                  <div style={{fontSize:'10px',color:'var(--text3)'}}>{ic} {l}</div>
                </div>
              ))}
            </div>
          </div>
          <div style={{fontSize:'11px',color:'var(--text3)'}}>
            Total da receita: {totais.cal} kcal · {pesoTotal}g
          </div>
          <div style={{fontSize:'11px',color:'var(--accent)',lineHeight:1.6,background:'rgba(74,222,128,.06)',padding:'10px 12px',borderRadius:'8px',border:'1px solid rgba(74,222,128,.15)'}}>
            💡 A receita vai aparecer na busca como "🍳 {nome}" e você escolhe quantas porções comeu.
          </div>
          <button className="btn btn-p btn-w" onClick={salvar}>Salvar receita ✓</button>
        </>}
      </div>
    </div>
  </>);
}

// ADD ALIMENTO
function AddAlimentoModal({usuario,tipo,onClose,onSave,showToast}){
  const [busca,setBusca]=useState('');
  const [res,setRes]=useState([]);
  const [sel,setSel]=useState(null);
  const [qtd,setQtd]=useState(100);
  const [step,setStep]=useState('busca');
  const timer=useRef(null);
  const buscar=async q=>{
    if(q.length<2){setRes([]);return;}
    const{data}=await sb.from('alimentos').select('*').ilike('nome',`%${q}%`).limit(25);
    setRes(data||[]);
  };
  useEffect(()=>{clearTimeout(timer.current);timer.current=setTimeout(()=>buscar(busca),280);},[busca]);
  const prev=sel?calcM(sel,qtd):null;
  const confirmar=async()=>{
    let{data:ref}=await sb.from('refeicoes').select('id,calorias_total,proteina_total,carboidrato_total,gordura_total').eq('usuario_id',usuario.id).eq('data',hoje()).eq('tipo',tipo).single();
    if(!ref){
      const{data:nova}=await sb.from('refeicoes').insert([{usuario_id:usuario.id,data:hoje(),tipo,hora:new Date().toTimeString().slice(0,5)}]).select('id').single();
      ref=nova;
    }
    if(!ref)return;
    await sb.from('refeicao_itens').insert([{refeicao_id:ref.id,alimento_id:sel.id,nome_item:sel.nome,quantidade_g:qtd,calorias:prev.cal,proteina:prev.prot,carboidrato:prev.carb,gordura:prev.gord}]);
    await sb.from('refeicoes').update({calorias_total:(ref.calorias_total||0)+prev.cal,proteina_total:(ref.proteina_total||0)+prev.prot,carboidrato_total:(ref.carboidrato_total||0)+prev.carb,gordura_total:(ref.gordura_total||0)+prev.gord}).eq('id',ref.id);
    // Se for bebida alcoólica, calcular sugestão proteica
    if(tipo==='bebida'&&prev.cal>80){
      const{data:refs}=await sb.from('refeicoes').select('calorias_total,proteina_total').eq('usuario_id',usuario.id).eq('data',hoje());
      const sug=calcSugestaoProt(usuario,refs||[],prev.cal);
      if(sug){setSugestaoProt(sug);onSave();return;}
    }
    onSave();onClose();
  };
  const tiposL={cafe_manha:'☕ Café da manhã',lanche_manha:'🍎 Lanche',almoco:'🍽️ Almoço',lanche_tarde:'🥜 Lanche',jantar:'🌙 Jantar',ceia:'🌙 Ceia',bebida:'🍺 Bebida'};
  const freq=['Arroz branco cozido','Frango desfiado cozido','Ovo inteiro cozido','Whey protein isolado','Patinho moído cozido','Sardinha em óleo escorrida'];
  const [sugestaoProt,setSugestaoProt]=useState(null);
  const [showCadastro,setShowCadastro]=useState(false);
  const [showReceita,setShowReceita]=useState(false);
  return(<>
    <div className="overlay" onClick={onClose}/>
    <div className="sheet">
      <div className="sh"/>
      <div className="shdr"><span className="shdr-t">{tiposL[tipo]||'➕ Adicionar'}</span><button className="btn-ic" onClick={onClose} style={{fontSize:'13px',color:'var(--text3)'}}>✕</button></div>
      <div className="sbody">
        {step==='busca'&&<>
          <div style={{display:'flex',gap:'8px',alignItems:'center'}}>
            <div className="srch-wrap" style={{flex:1}}><span className="srch-ic">🔍</span><input className="srch" placeholder="Buscar alimento..." value={busca} onChange={e=>setBusca(e.target.value)} autoFocus/></div>
            <button onClick={async()=>{
              try{
                if(!('BarcodeDetector' in window)){const cod=prompt('Digite o código de barras:');if(cod){const{data}=await sb.from('alimentos').select('*').eq('codigo_barras',cod).single();if(data){setSelecionado&&setSelecionado(data);setSel&&setSel(data);setStep('qtd');}else{showToast&&showToast('Código não encontrado','e');}}return;}
                const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}});
                const video=document.createElement('video');video.srcObject=stream;video.play();
                const detector=new BarcodeDetector({formats:['ean_13','ean_8','upc_a','upc_e','code_128']});
                const tryRead=async()=>{
                  for(let i=0;i<30;i++){
                    await new Promise(r=>setTimeout(r,300));
                    try{const codes=await detector.detect(video);
                      if(codes.length>0){stream.getTracks().forEach(t=>t.stop());
                        const cod=codes[0].rawValue;
                        const{data:al}=await sb.from('alimentos').select('*').eq('codigo_barras',cod).single();
                        if(al){setSel(al);setStep('qtd');showToast&&showToast('Produto encontrado! ✅');}
                        else{
                          const r=await fetch(`https://world.openfoodfacts.org/api/v0/product/${cod}.json`);
                          const d=await r.json();
                          if(d.status===1){const p=d.product;const n=p.nutriments||{};
                            const novo={id:'temp_'+cod,nome:p.product_name||'Produto',marca:p.brands||'',calorias_100g:Math.round(n['energy-kcal_100g']||0),proteina_100g:+(n.proteins_100g||0).toFixed(1),carboidrato_100g:+(n.carbohydrates_100g||0).toFixed(1),gordura_100g:+(n.fat_100g||0).toFixed(1),fibra_100g:+(n.fiber_100g||0).toFixed(1)};
                            setSel(novo);setStep('qtd');showToast&&showToast('Produto encontrado! ✅');
                          }else{showToast&&showToast('Código não encontrado','e');}
                        }
                        return;
                      }
                    }catch(e){}
                  }
                  stream.getTracks().forEach(t=>t.stop());showToast&&showToast('Não foi possível ler. Tente novamente.','e');
                };
                tryRead();
              }catch(e){showToast&&showToast('Sem acesso à câmera','e');}
            }} style={{width:'44px',height:'44px',background:'rgba(34,211,238,.08)',border:'1.5px solid rgba(34,211,238,.25)',borderRadius:'var(--rs)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'20px',cursor:'pointer',flexShrink:0}}>📷</button>
          </div>
          {res.length>0&&<div className="sres">{res.map(a=>(
            <div key={a.id} className="si" onClick={()=>{setSel(a);setStep('qtd');}}>
              <div><div className="si-n">{a.nome}{a.marca&&<span style={{fontSize:'10px',color:'var(--text3)'}}> · {a.marca}</span>}</div>
              <div className="si-m">P:{a.proteina_100g}g · C:{a.carboidrato_100g}g · G:{a.gordura_100g}g</div></div>
              <div className="si-c">{a.calorias_100g}<span style={{fontSize:'10px',color:'var(--text3)'}}>kcal</span></div>
            </div>
          ))}</div>}
          {busca.length>=2&&res.length===0&&<div className="empty" style={{padding:'16px'}}><span className="empty-ic">🔍</span><span style={{fontSize:'13px',color:'var(--text3)'}}>Nenhum resultado.</span></div>}
          <div style={{display:'flex',gap:'7px',marginTop:'-4px'}}>
            <button onClick={()=>setShowCadastro(true)} style={{flex:1,padding:'9px',background:'rgba(74,222,128,.07)',border:'1.5px solid rgba(74,222,128,.2)',borderRadius:'var(--rs)',fontSize:'12px',color:'var(--accent)',fontWeight:600,cursor:'pointer',fontFamily:'DM Sans'}}>➕ Novo alimento</button>
            <button onClick={()=>setShowReceita(true)} style={{flex:1,padding:'9px',background:'rgba(167,139,250,.07)',border:'1.5px solid rgba(167,139,250,.2)',borderRadius:'var(--rs)',fontSize:'12px',color:'var(--accent5)',fontWeight:600,cursor:'pointer',fontFamily:'DM Sans'}}>🍳 Nova receita</button>
          </div>
          {busca.length===0&&<div style={{display:'flex',flexDirection:'column',gap:'5px'}}>
            <div style={{fontSize:'11px',color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.8px',marginBottom:'3px'}}>Frequentes</div>
            {freq.map(n=>(

// EVENTO ESPECIAL MODAL
function EventoModal({usuario,onClose,onSave,showToast}){
  const [nome,setNome]=useState('');
  const [desc,setDesc]=useState('');
  const [data,setData]=useState(hoje());
  const [resultado,setResultado]=useState(null);
  const [analisando,setAnalisando]=useState(false);

  const analisar=async()=>{
    if(!desc.trim())return;
    setAnalisando(true);
    const texto=desc.toLowerCase();
    let cal=0;
    const itens=[];

    // Helper: extrair quantidade + item
    const match=(regex,calPor,label)=>{
      const m=texto.match(regex);
      if(m){const n=+(m[1]||1);const total=Math.round(n*calPor);cal+=total;itens.push(`${n}x ${label} ≈ ${total} kcal`);return n;}
      return 0;
    };

    // PIZZAS
    match(/(\d+)\s*pedaço[s]?\s*de\s*pizza\s*(?:de\s*)?(?:quatro\s*queijos?|4\s*queijos?)/i,290,'pedaço pizza 4 queijos');
    match(/(\d+)\s*pedaço[s]?\s*de\s*pizza\s*(?:de\s*)?(?:portuguesa)/i,278,'pedaço pizza portuguesa');
    match(/(\d+)\s*pedaço[s]?\s*de\s*pizza\s*(?:de\s*)?(?:frango|catupiry)/i,268,'pedaço pizza frango');
    match(/(\d+)\s*pedaço[s]?\s*de\s*pizza\s*(?:de\s*)?(?:atum)/i,255,'pedaço pizza atum');
    match(/(\d+)\s*pedaço[s]?\s*de\s*pizza\s*(?:de\s*)?(?:muçarela|mussarela|queijo(?!\s*quatro))/i,266,'pedaço pizza muçarela');
    // pizza genérica (se não casou acima)
    if(!texto.match(/\d+\s*pedaço[s]?\s*de\s*pizza\s*(?:de\s*)?(?:portuguesa|frango|catupiry|atum|muçarela|mussarela|quatro|4)/i)){
      match(/(\d+)\s*pedaço[s]?\s*(?:de\s*)?pizza/i,270,'pedaço de pizza');
    }

    // CERVEJAS por marca
    match(/(\d+)\s*(?:lata[s]?|cerveja[s]?)\s*(?:de\s*)?(?:spaten)/i,165,'cerveja Spaten 350ml');
    match(/(\d+)\s*(?:lata[s]?|cerveja[s]?)\s*(?:de\s*)?(?:heineken)/i,161,'cerveja Heineken 350ml');
    match(/(\d+)\s*(?:lata[s]?|cerveja[s]?)\s*(?:de\s*)?(?:amstel)/i,154,'cerveja Amstel 350ml');
    match(/(\d+)\s*(?:lata[s]?|cerveja[s]?)\s*(?:de\s*)?(?:brahma)/i,151,'cerveja Brahma 350ml');
    match(/(\d+)\s*(?:lata[s]?|cerveja[s]?)\s*(?:de\s*)?(?:skol)/i,147,'cerveja Skol 350ml');
    match(/(\d+)\s*(?:lata[s]?|cerveja[s]?)\s*(?:de\s*)?(?:itaipava)/i,140,'cerveja Itaipava 350ml');
    match(/(\d+)\s*(?:lata[s]?|cerveja[s]?)\s*(?:de\s*)?(?:duplo\s*malte|duplo)/i,193,'cerveja duplo malte 350ml');
    // cerveja genérica
    if(!texto.match(/lata[s]?\s*(?:de\s*)?(?:spaten|heineken|amstel|brahma|skol|itaipava|duplo)/i)){
      match(/(\d+)\s*(?:lata[s]?|cerveja[s]?)/i,150,'cerveja 350ml');
    }

    // CARNES CHURRASCO
    match(/(\d+)\s*(?:g|gramas?)\s*(?:de\s*)?picanha/i,2.56,'picanha (por g)');
    match(/(\d+)\s*(?:pedaço[s]?|fatia[s]?)\s*(?:de\s*)?picanha/i,350,'pedaço de picanha ~140g');
    match(/(\d+)\s*linguiça[s]?\s*(?:toscana)?/i,295,'linguiça toscana');
    match(/(\d+)\s*(?:g|gramas?)\s*(?:de\s*)?(?:frango|coxinha\s*da\s*asa)/i,2.15,'frango (por g)');
    match(/(\d+)\s*coxinha[s]?\s*da\s*asa/i,215,'coxinha da asa');
    match(/(\d+)\s*espetinho[s]?/i,200,'espetinho');
    match(/(\d+)\s*(?:g|gramas?)\s*(?:de\s*)?(?:costela|costela)/i,2.8,'costela (por g)');
    match(/(\d+)\s*pão[s]?\s*de\s*alho/i,310,'pão de alho');

    // BEBIDAS
    match(/(\d+)\s*(?:dose[s]?|copo[s]?)\s*(?:de\s*)?(?:vodka|smirnoff|askov)/i,115,'dose de vodka 50ml');
    match(/(\d+)\s*(?:dose[s]?|copo[s]?)\s*(?:de\s*)?(?:whisky|whiskey)/i,125,'dose de whisky 50ml');
    match(/(\d+)\s*(?:dose[s]?|copo[s]?)\s*(?:de\s*)?cachaça/i,105,'dose de cachaça 50ml');
    match(/(\d+)\s*caipirinha[s]?/i,195,'caipirinha');
    match(/(\d+)\s*(?:copo[s]?|lata[s]?)\s*(?:de\s*)?coca/i,140,'Coca-Cola lata');
    match(/(\d+)\s*(?:copo[s]?|lata[s]?)\s*(?:de\s*)?guaraná/i,154,'Guaraná lata');

    // FAST FOOD
    match(/(\d+)\s*(?:big\s*mac|bigmac)/i,550,'Big Mac');
    match(/(\d+)\s*(?:x-burguer|x-burger)/i,490,'X-Burguer');
    match(/(\d+)\s*hamburguer[s]?\s*(?:artesanal)?/i,600,'hambúrguer artesanal');
    match(/(\d+)\s*batata[s]?\s*frita[s]?/i,350,'batata frita média');
    match(/(\d+)\s*(?:esfiha[s]?|esfirra[s]?)/i,260,'esfiha');
    match(/(\d+)\s*coxinha[s]?(?!\s*da)/i,265,'coxinha');

    // SOBREMESAS
    match(/(\d+)\s*fatia[s]?\s*(?:de\s*)?bolo/i,380,'fatia de bolo');
    match(/(\d+)\s*brigadeiro[s]?/i,62,'brigadeiro');

    if(cal===0){cal=800;itens.push('Estimativa genérica para evento ≈ 800 kcal');}

    const excesso=Math.max(0,cal-300);
    const passoExtra=Math.round(excesso/0.04);
    setResultado({cal,itens,excesso,passoExtra,metaHoje:usuario.meta_calorica});
    setAnalisando(false);
  };

  const salvar=async()=>{
    if(!resultado)return;
    await sb.from('eventos_especiais').insert([{usuario_id:usuario.id,data,tipo:'personalizado',descricao:`${nome}: ${desc}`,calorias_estimadas:resultado.cal,planejado:true,compensado:false}]);
    showToast('Evento salvo! 📅');
    onSave();onClose();
  };

  return(<>
    <div className="overlay" onClick={onClose}/>
    <div className="sheet">
      <div className="sh"/>
      <div className="shdr"><span className="shdr-t">📅 Evento especial</span><button className="btn-ic" onClick={onClose} style={{fontSize:'13px',color:'var(--text3)'}}>✕</button></div>
      <div className="sbody">
        <div className="fld"><label>Nome do evento</label><input placeholder="Ex: Pizzaria, Churrasco, Aniversário" value={nome} onChange={e=>setNome(e.target.value)}/></div>
        <div className="fld"><label>Data</label><input type="date" value={data} onChange={e=>setData(e.target.value)}/></div>
        <div className="fld"><label>O que você vai consumir?</label>
          <textarea className="ev-textarea" placeholder="Ex: 4 pedaços de pizza de queijo + 1 pedaço pizza portuguesa + 1 coca cola + 3 latas de cerveja duplo malte..." value={desc} onChange={e=>setDesc(e.target.value)}/>
        </div>
        {!resultado&&<button className="btn btn-s btn-w" onClick={analisar} style={{opacity:desc.trim()?1:.5}}>{analisando?'Calculando...':'🔍 Calcular e planejar'}</button>}
        {resultado&&<div className="ev-result">
          <div className="ev-result-title">📊 Análise do evento</div>
          {resultado.itens.map((it,i)=><div key={i} className="ev-result-item"><span>•</span><span>{it}</span></div>)}
          <div style={{borderTop:'1px solid var(--border)',paddingTop:'8px',display:'flex',flexDirection:'column',gap:'6px'}}>
            <div className="ev-result-item"><span>🔥</span><span><strong>Total estimado:</strong> {resultado.cal} kcal</span></div>
            <div className="ev-result-item"><span>🥗</span><span><strong>Antes do evento:</strong> coma leve, foque em proteína. Tente não ultrapassar 400 kcal antes.</span></div>
            {resultado.excesso>0&&<div className="ev-result-item"><span>🏃</span><span><strong>Para compensar:</strong> caminhe +{resultado.passoExtra.toLocaleString()} passos ou faça 30min extra de treino no dia seguinte.</span></div>}
            <div className="ev-result-item"><span>💧</span><span><strong>Hidratação:</strong> beba 1 copo de água entre cada bebida alcoólica. Durma bem para recuperação.</span></div>
            <div className="ev-result-item" style={{color:'var(--accent)',fontSize:'12px'}}><span>✅</span><span>Sem culpa! Um evento especial não desfaz seu progresso. Retome a rotina no dia seguinte.</span></div>
          </div>
        </div>}
        {resultado&&<button className="btn btn-p btn-w" onClick={salvar}>Salvar evento ✓</button>}
      </div>
    </div>
  </>);
}

// INICIAR TREINO MODAL
function IniciarTreinoModal({treino,usuario,onClose,onSave,showToast}){
  const [sets,setSets]=useState(()=>treino.exercicios.reduce((a,ex)=>({...a,[ex.nome]:Array(ex.series||3).fill({reps:'',peso:''})}),{}));
  const [exModal,setExModal]=useState(null);
  const [salvando,setSalvando]=useState(false);
  const [inicio]=useState(Date.now());
  const [histTreino,setHistTreino]=useState({});

  // Buscar histórico do último treino igual
  useEffect(()=>{
    const buscarHist=async()=>{
      const{data:ult}=await sb.from('treinos').select('id').eq('usuario_id',usuario.id).eq('nome',treino.nome).order('data',{ascending:false}).limit(1).single();
      if(!ult)return;
      const{data:exs}=await sb.from('treino_exercicios').select('*').eq('treino_id',ult.id);
      if(!exs)return;
      const h={};
      exs.forEach(e=>{h[e.nome_exercicio]={reps:e.repeticoes,peso:e.peso_kg};});
      setHistTreino(h);
      // Preencher sets com valores anteriores como placeholder
      setSets(p=>{
        const novo={...p};
        Object.keys(h).forEach(nm=>{
          if(novo[nm])novo[nm]=novo[nm].map(s=>({...s}));
        });
        return novo;
      });
    };
    buscarHist();
  },[]);

  const updateSet=(exNome,idx,campo,val)=>{
    setSets(p=>({...p,[exNome]:p[exNome].map((s,i)=>i===idx?{...s,[campo]:val}:s)}));
  };

  const salvar=async()=>{
    setSalvando(true);
    const dur=Math.round((Date.now()-inicio)/60000);
    const{data:tr}=await sb.from('treinos').insert([{usuario_id:usuario.id,data:hoje(),nome:treino.nome,grupos_musculares:treino.grupos,duracao_minutos:dur}]).select('id').single();
    if(tr){
      const exRows=treino.exercicios.map((ex,i)=>({treino_id:tr.id,nome_exercicio:ex.nome,series:ex.series||3,repeticoes:sets[ex.nome]?.map(s=>s.reps||'0').join(','),peso_kg:+sets[ex.nome]?.[0]?.peso||0,ordem:i+1}));
      await sb.from('treino_exercicios').insert(exRows);
    }
    showToast('Treino salvo! 💪');
    onSave();onClose();
    setSalvando(false);
  };

  // buscar exercício do banco para modal
  const abrirEx=async(nome)=>{
    const{data}=await sb.from('exercicios').select('*').ilike('nome',`%${nome.split(' ')[0]}%`).limit(1).single();
    setExModal(data||{nome,grupo_muscular:'',equipamento:''});
  };

  return(<>
    <div className="overlay" onClick={onClose}/>
    <div className="sheet" style={{maxHeight:'95vh'}}>
      <div className="sh"/>
      <div className="shdr"><span className="shdr-t">▶ {treino.nome}</span><button className="btn-ic" onClick={onClose} style={{fontSize:'13px',color:'var(--text3)'}}>✕</button></div>
      <div className="sbody">
        {treino.exercicios.map((ex,ei)=>(
          <div key={ei} style={{background:'var(--bg3)',borderRadius:'var(--rs)',padding:'12px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'9px'}}>
              <div>
                <div style={{fontSize:'14px',fontWeight:600,cursor:'pointer',color:'var(--accent2)'}} onClick={()=>abrirEx(ex.nome)}>{ex.nome} 📷</div>
                <div style={{fontSize:'11px',color:'var(--text3)',marginTop:'1px'}}>{ex.dica}</div>
                {histTreino[ex.nome]&&<div className="hist-peso">📊 Último: {histTreino[ex.nome].reps} reps · {histTreino[ex.nome].peso}kg</div>}
              </div>
            </div>
            <div style={{display:'flex',gap:'6px',marginBottom:'6px'}}>
              <div style={{flex:1,fontSize:'10px',color:'var(--text3)',textAlign:'center',fontWeight:600}}>SÉRIE</div>
              <div style={{flex:2,fontSize:'10px',color:'var(--text3)',textAlign:'center',fontWeight:600}}>REPS</div>
              <div style={{flex:2,fontSize:'10px',color:'var(--text3)',textAlign:'center',fontWeight:600}}>PESO (kg)</div>
            </div>
            {(sets[ex.nome]||[]).map((s,si)=>(
              <div key={si} style={{display:'flex',gap:'6px',marginBottom:'5px',alignItems:'center'}}>
                <div style={{flex:1,height:'36px',background:'var(--card)',borderRadius:'7px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'13px',fontWeight:700,color:'var(--text3)'}}>{si+1}</div>
                <input value={s.reps} onChange={e=>updateSet(ex.nome,si,'reps',e.target.value)} placeholder={ex.reps?.split(',')?.[si]||'12'} style={{flex:2,height:'36px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:'7px',textAlign:'center',fontSize:'14px',fontWeight:600,color:'var(--text)',outline:'none',fontFamily:'DM Sans'}}/>
                <input value={s.peso} onChange={e=>updateSet(ex.nome,si,'peso',e.target.value)} placeholder="?" style={{flex:2,height:'36px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:'7px',textAlign:'center',fontSize:'14px',fontWeight:600,color:'var(--text)',outline:'none',fontFamily:'DM Sans'}}/>
              </div>
            ))}
          </div>
        ))}
        <button className="btn btn-p btn-w" onClick={salvar} style={{opacity:salvando?.5:1}}>{salvando?'Salvando...':'✓ Finalizar treino'}</button>
      </div>
    </div>
    {exModal&&<ExModal ex={exModal} onClose={()=>setExModal(null)}/>}
  </>);
}

// DASHBOARD
function Dashboard({usuario,checkin,refeicoes,refresh,showToast,streak,resumoSemanal,historicoSemana,pwaPrompt}){
  const [addModal,setAddModal]=useState(null);
  const [dataVis,setDataVis]=useState(hoje());
  const [refeicoesData,setRefeicoesData]=useState(refeicoes);
  const [checkinData,setCheckinData]=useState(checkin);
  const isHoje=dataVis===hoje();

  useEffect(()=>{setRefeicoesData(refeicoes);setCheckinData(checkin);},[refeicoes,checkin]);

  const mudarData=async(dias)=>{
    const d=new Date(dataVis+'T12:00:00');
    d.setDate(d.getDate()+dias);
    const novaData=d.toISOString().split('T')[0];
    if(novaData>hoje())return;
    setDataVis(novaData);
    const[{data:ci},{data:refs}]=await Promise.all([
      sb.from('checkins_diarios').select('*').eq('usuario_id',usuario.id).eq('data',novaData).single(),
      sb.from('refeicoes').select('*').eq('usuario_id',usuario.id).eq('data',novaData),
    ]);
    setCheckinData(ci||null);
    setRefeicoesData(refs||[]);
  };

  const dataLabel=isHoje?'Hoje':new Date(dataVis+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'});
  const totalCal=refeicoesData.reduce((s,r)=>s+(r.calorias_total||0),0);
  const totalProt=refeicoesData.reduce((s,r)=>s+(r.proteina_total||0),0);
  const totalCarb=refeicoesData.reduce((s,r)=>s+(r.carboidrato_total||0),0);
  const totalGord=refeicoesData.reduce((s,r)=>s+(r.gordura_total||0),0);
  const pCal=Math.min(totalCal/usuario.meta_calorica*100,100);
  const pProt=Math.min(totalProt/usuario.meta_proteina*100,100);
  const pCarb=Math.min(totalCarb/(usuario.meta_carboidrato||150)*100,100);
  const pGord=Math.min(totalGord/(usuario.meta_gordura||60)*100,100);
  const restaCal=Math.max(0,usuario.meta_calorica-totalCal);
  const restaProt=Math.max(0,usuario.meta_proteina-totalProt);
  // ajuste por passos
  const calExtra=Math.round((checkinData?.passos||0)*0.04);
  const treinoHoje = checkinData?.observacao?.includes('treino:') ? checkinData.observacao.match(/treino:([ABC])/)?.[1] : null;
  const calTreino=treinoHoje?GASTO_TREINO[treinoHoje]||0:0;
  const metaAjustada=usuario.meta_calorica+calExtra+calTreino;
  const extraTotal=calExtra+calTreino;
  // Catabolismo: mais de 13k passos E proteína abaixo de 70%
  const alertaCatabolismo=(checkinData?.passos||0)>13000&&totalProt<usuario.meta_proteina*.70;
  // Modo bebida ativo
  const temBebida=refeicoesData.find(r=>r.tipo==='bebida'&&(r.calorias_total||0)>80);
  // Pré/pós treino
  const diasTreino=['sabado','domingo','terca'];
  const diaSemanaAtual=['domingo','segunda','terca','quarta','quinta','sexta','sabado'][new Date().getDay()];
  const ehDiaTreino=diasTreino.includes(diaSemanaAtual)&&isHoje;
  const prePost=ehDiaTreino?calcPrePosTreino(usuario,refeicoesData,'A'):null;
  const diasSemana=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const hojeIdx=new Date().getDay();
  const r=44;const circ=2*Math.PI*r;const offset=circ-(pCal/100)*circ;
  const tiposRef=[
    {tipo:'cafe_manha',icon:'☕',nome:'Café da manhã'},
    {tipo:'almoco',icon:'🍽️',nome:'Almoço'},
    {tipo:'lanche_tarde',icon:'🥜',nome:'Lanche'},
    {tipo:'jantar',icon:'🌙',nome:'Jantar'},
    {tipo:'bebida',icon:'🍺',nome:'Bebida'},
  ];
  const insights=[];
  if(restaProt>30)insights.push({c:'b',ic:'💪',t:'Proteína em falta',m:`Faltam ${restaProt.toFixed(0)}g de proteína. Adicione um whey, frango ou ovo.`});
  if(totalCal>metaAjustada*.95&&totalCal<metaAjustada*1.1)insights.push({c:'g',ic:'🎯',t:'Meta calórica quase fechada!',m:`${Math.round(totalCal)} / ${metaAjustada} kcal. Ótimo controle hoje.`});
  if(totalCal>metaAjustada*1.1)insights.push({c:'y',ic:'⚠️',t:'Calorias acima da meta',m:`+${Math.round(totalCal-metaAjustada)} kcal acima. Dê ${Math.round((totalCal-metaAjustada)/0.04).toLocaleString()} passos extras para compensar.`});
  if(checkinData?.horas_sono<6)insights.push({c:'r',ic:'😴',t:'Sono curto detectado',m:`${checkin.horas_sono}h de sono reduz recuperação e aumenta cortisol. Tente compensar hoje.`});
  if(calExtra>0)insights.push({c:'g',ic:'👟',t:`+${calExtra} kcal extras pela caminhada`,m:`Você caminhou ${(checkinData?.passos||0).toLocaleString()} passos. Sua meta calórica subiu para ${metaAjustada} kcal hoje.`});
  if(insights.length===0&&totalCal>0)insights.push({c:'g',ic:'✅',t:'Dia no caminho certo!',m:'Continue assim! Você está dentro das metas. 🎯'});

  return(<div className="page">
    <div className="greet">
      <div className="greet-n">Olá, <span>{usuario.nome.split(' ')[0]}</span> 👋</div>
      <div className="greet-d">{dataFmt()}</div>
    </div>
    {pwaPrompt&&<div className="pwa-banner" onClick={()=>pwaPrompt.prompt()}>
      <span style={{fontSize:'22px'}}>📱</span>
      <div className="pwa-banner-text">Instale o Evolua na tela inicial do seu celular para acesso rápido e notificações!</div>
      <button className="pwa-banner-btn">Instalar</button>
    </div>}
    {streak>=3&&<div className="streak-card">
      <div className="streak-num">🔥{streak}</div>
      <div className="streak-info">
        <div className="streak-title">{streak} dias seguidos!</div>
        <div className="streak-sub">{streak>=7?'Semana perfeita! Continue assim.':streak>=5?'Quase uma semana completa!':'Boa sequência, não quebre!'}</div>
      </div>
    </div>}
    <div className="date-nav">
      <button className="date-nav-btn" onClick={()=>mudarData(-1)}>‹</button>
      <span className="date-nav-label">{dataLabel} {!isHoje&&'📅'}</span>
      <button className="date-nav-btn" onClick={()=>mudarData(1)} style={{opacity:isHoje?.3:1}}>›</button>
    </div>
    {/* CHECK-IN */}
    <div className="card"><div className="ctitle">Check-in de hoje</div>
      <div className="ci-items">
        {[{ic:'😴',l:'Sono',v:checkinData?.horas_sono?`${checkin.horas_sono}h`:'—',done:!!checkinData?.horas_sono},
          {ic:'⚖️',l:'Peso',v:checkinData?.peso_manha?`${checkin.peso_manha}kg`:`${usuario.peso_atual}kg`,done:!!checkinData?.peso_manha},
          {ic:'💧',l:'Água',v:checkinData?.agua_ml?`${(checkin.agua_ml/1000).toFixed(1)}L`:'0L',done:(checkinData?.agua_ml||0)>=1000},
          {ic:'👟',l:'Passos',v:(checkinData?.passos||0).toLocaleString(),done:(checkinData?.passos||0)>=usuario.meta_passos},
          {ic:'🚬',l:'Cigarros',v:checkinData?.observacao?.includes('cigarros:')?checkin.observacao.split('cigarros:')[1]:'—',done:true},
        ].map(it=><div key={it.l} className={`ci-item ${it.done?'done':''}`}><span className="ci-ic">{it.ic}</span><span className="ci-val">{it.v}</span><span className="ci-lbl">{it.l}</span></div>)}
      </div>
    </div>
    {/* MACROS */}
    <div className="card">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}}>
        <span style={{fontSize:'13px',fontWeight:600,color:'var(--text2)'}}>Macros do dia</span>
        <span style={{fontSize:'11px',color:'var(--text3)',display:'flex',alignItems:'center',gap:'3px'}}>
          {restaCal>0?`Faltam ${Math.round(restaCal)} kcal`:'Meta atingida!'}
          {extraTotal>0&&<span className="meta-extra">+{extraTotal}kcal</span>}
        </span>
      </div>
      <div className="macro-wrap">
        <div className="ring-wrap">
          <svg width="108" height="108" viewBox="0 0 108 108">
            <circle cx="54" cy="54" r={r} fill="none" stroke="var(--bg3)" strokeWidth="9"/>
            <circle cx="54" cy="54" r={r} fill="none" stroke="url(#g1)" strokeWidth="9" strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round"/>
            <defs><linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stopColor="var(--accent)"/><stop offset="100%" stopColor="var(--accent2)"/></linearGradient></defs>
          </svg>
          <div className="ring-ctr"><span className="ring-cal">{Math.round(totalCal)}</span><span className="ring-lbl">kcal</span></div>
        </div>
        <div className="mbars">
          {[{n:'Proteína',v:totalProt,m:usuario.meta_proteina,c:'var(--accent)',p:pProt},
            {n:'Carbs',v:totalCarb,m:usuario.meta_carboidrato||150,c:'var(--accent2)',p:pCarb},
            {n:'Gordura',v:totalGord,m:usuario.meta_gordura||60,c:'var(--accent3)',p:pGord},
          ].map(mb=><div key={mb.n} className="mbar">
            <div className="mbar-top"><span className="mbar-n">{mb.n}</span><span className="mbar-v">{mb.v.toFixed(0)}g/{mb.m}g</span></div>
            <div className="mbar-track"><div className="mbar-fill" style={{width:`${mb.p}%`,background:mb.c}}/></div>
          </div>)}
        </div>
      </div>
    </div>
    {/* PASSOS */}
    {checkinData&&<div className="card">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'4px'}}>
        <div><div className="passos-num">{(checkin.passos||0).toLocaleString()}</div><div className="passos-meta">Meta: {usuario.meta_passos.toLocaleString()}</div></div>
        <span className="passos-badge">{checkin.passos_tipo==='parcial'?'🔄 Parcial':'✅ Final'}</span>
      </div>
      <div className="ptrack"><div className="pfill" style={{width:`${Math.min(100,(checkin.passos||0)/usuario.meta_passos*100)}%`}}/></div>
      <div className="pmsg">{(checkin.passos||0)>=usuario.meta_passos?`🎉 Meta atingida! Queima extra: ~${calExtra} kcal.`:checkin.passos_tipo==='parcial'?`👟 Faltam ${(usuario.meta_passos-(checkin.passos||0)).toLocaleString()} passos. Queima até agora: ~${calExtra} kcal.`:`📊 ${(usuario.meta_passos-(checkin.passos||0)).toLocaleString()} abaixo da meta.`}</div>
    </div>}
    {/* ALERTA CATABOLISMO */}
    {alertaCatabolismo&&<div className="ins b">
      <span className="ins-ico">⚡</span>
      <div><div className="ins-t">Risco de catabolismo!</div>
      <div className="ins-m">Você andou muito ({(checkinData?.passos||0).toLocaleString()} passos) e sua proteína está em {totalProt.toFixed(0)}g — abaixo de 70% da meta. Adicione proteína agora para proteger o músculo.</div>
      </div>
    </div>}
    {/* MODO BEBIDA */}
    {temBebida&&<div className="modo-bebida">
      <div className="modo-bebida-title">🍺 Modo fim de semana ativo</div>
      <div style={{fontSize:'12px',color:'var(--text2)',lineHeight:1.6,display:'flex',flexDirection:'column',gap:'5px'}}>
        <span>💧 Beba 1 copo de água entre cada dose de álcool</span>
        <span>🥗 Priorize proteínas nas próximas refeições</span>
        <span>😴 Durma bem — o álcool reduz a recuperação muscular</span>
        <span>✅ Um evento especial não desfaz seu progresso. Retome amanhã!</span>
      </div>
    </div>}
    {/* PRÉ/PÓS TREINO */}
    {prePost&&isHoje&&<div className="prepost-card">
      <div className="prepost-title">🏋️ Dia de treino — sugestões</div>
      {prePost.aviso&&<div style={{fontSize:'12px',color:'var(--accent4)',marginBottom:'8px',lineHeight:1.5}}>{prePost.aviso}</div>}
      <div className="prepost-item">
        <span className="prepost-badge pre">PRÉ</span>
        <div className="prepost-text">{prePost.pre.ic} <strong>{prePost.pre.nome}</strong> — {prePost.pre.cal} kcal · {prePost.pre.prot}g prot · {prePost.pre.carb}g carbs<br/><span style={{fontSize:'11px',color:'var(--text3)'}}>45min antes do treino</span></div>
      </div>
      <div className="prepost-item">
        <span className="prepost-badge pos">PÓS</span>
        <div className="prepost-text">{prePost.pos.ic} <strong>{prePost.pos.nome}</strong> — {prePost.pos.cal} kcal · {prePost.pos.prot}g prot<br/><span style={{fontSize:'11px',color:'var(--text3)'}}>Até 1h após o treino</span></div>
      </div>
      <div style={{fontSize:'11px',color:'var(--text3)',marginTop:'5px'}}>Gasto estimado no treino: ~{prePost.gastoPrevisto} kcal ✓</div>
    </div>}
    {/* INSIGHTS */}
    {insights.map((ins,i)=><div key={i} className={`ins ${ins.c}`}><span className="ins-ico">{ins.ic}</span><div><div className="ins-t">{ins.t}</div><div className="ins-m">{ins.m}</div></div></div>)}
    {/* PLACAR */}
    <div className="card">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
        <span className="ctitle" style={{margin:0}}>Placar da semana</span>
        <span style={{fontSize:'13px',fontWeight:700,color:'var(--accent)'}}>Boa semana 🟢</span>
      </div>
      <div className="placar-dias">
        {diasSemana.map((d,i)=><div key={d} className="pd">
          <div className={`pd-dot ${i<hojeIdx?'g':i===hojeIdx?'h v':''} `}>{i<hojeIdx?'✓':i===hojeIdx?'•':''}</div>
          <span className="pd-lbl">{d}</span>
        </div>)}
      </div>
    </div>
    {/* RESUMO SEMANAL (domingo) */}
    {resumoSemanal&&new Date().getDay()===0&&<div className="resumo-card">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'}}>
        <span className="ctitle" style={{margin:0}}>Resumo da semana 📊</span>
      </div>
      <div className="resumo-stats">
        {[['🔥','Média cal',resumoSemanal.mediaCalSemana+'kcal'],['💪','Média prot',resumoSemanal.mediaProtSemana+'g'],
          ['🏋️','Treinos',resumoSemanal.treinos+'x'],['👟','Passos méd.',resumoSemanal.mediaPassosSemana.toLocaleString()],
        ].map(([ic,l,v])=>(
          <div key={l} className="resumo-stat"><div className="resumo-stat-v">{ic} {v}</div><div className="resumo-stat-l">{l}</div></div>
        ))}
      </div>
      <div className="resumo-frase">{resumoSemanal.frase}</div>
    </div>}
    {/* REFEIÇÕES */}
    <div className="sec">
      <div className="sec-hdr"><span className="sec-t">Refeições de hoje</span></div>
      {tiposRef.map(t=>{
        const ref=refeicoesData.find(r=>r.tipo===t.tipo);
        return<div key={t.tipo} className="meal" onClick={()=>setAddModal({tipo:'alimento',subtipo:t.tipo})}>
          <span className="meal-ico">{t.icon}</span>
          <div className="meal-info">
            <div className="meal-n">{t.nome}</div>
            <div className="meal-mac">{ref?`P:${ref.proteina_total?.toFixed(0)}g · C:${ref.carboidrato_total?.toFixed(0)}g · G:${ref.gordura_total?.toFixed(0)}g`:'Toque para adicionar'}</div>
          </div>
          {ref?<span className="meal-cal">{ref.calorias_total?.toFixed(0)}</span>:<span style={{fontSize:'19px',color:'var(--text3)'}}>+</span>}
        </div>;
      })}
    </div>
    {addModal?.tipo==='alimento'&&<AddAlimentoModal usuario={usuario} tipo={addModal.subtipo} onClose={()=>setAddModal(null)} onSave={()=>{refresh();showToast('Adicionado! 🍽️');}} showToast={showToast}/>}
  </div>);
}

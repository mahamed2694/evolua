      {nome:'Stiff com halteres',series:3,reps:'12,10,10',dica:'Costas retas, quadril para trás. Sinta o posterior.'},
      {nome:'Agachamento com halteres',series:3,reps:'15,12,12',dica:'Pés um pouco mais abertos. Vá fundo.'},
      {nome:'Panturrilha em pé',series:4,reps:'20,18,15,15',dica:'Use um degrau para maior amplitude.'},
      {nome:'Abdominal crunch',series:3,reps:'20,15,15',dica:'Suba devagar, desça controlado. Não use impulso do pescoço.'},
      {nome:'Prancha',series:3,reps:'30s,40s,45s',dica:'Core forte = melhor desempenho em todos os exercícios.'},
    ]},
  };
  const tr=treinosData[tab];
  const abrirEx=async(nome)=>{
    const{data}=await sb.from('exercicios').select('*').ilike('nome',`%${nome.split(' ')[0]}%`).limit(1).single();
    setExModal(data||{nome,grupo_muscular:'',equipamento:''});
  };
  return(<div className="page">
    <div className="phdr"><div><div className="phdr-t">Treinos 🏋️</div><div className="phdr-s">Sua divisão personalizada</div></div></div>
    <div style={{padding:'0 20px 16px'}}>
      <div className="tr-tabs">
        {['A','B','C'].map(t=><button key={t} className={`tr-tab ${tab===t?'active':''}`} onClick={()=>setTab(t)}>Treino {t}</button>)}
      </div>
      <div className="tr-card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}}>
          <span className="tr-nm">{tr.nome}</span>
          <span className={`tr-badge ${tab==='C'?'novo':'ativo'}`}>{tab==='C'?'⭐ Sugerido':'📅 Ativo'}</span>
        </div>
        {tab==='C'&&<div className="tr-sug">💡 <strong>Personal:</strong> Adicionar pernas acelera a perda de gordura abdominal e aumenta testosterona naturalmente. Experimente 1x por semana!</div>}
        <div style={{display:'flex',flexDirection:'column',gap:'5px',marginBottom:'12px'}}>
          {tr.exercicios.map((ex,i)=>(
            <div key={i} className="ex-row" onClick={()=>abrirEx(ex.nome)}>
              <div className="ex-num">{i+1}</div>
              <div className="ex-info">
                <div className="ex-nm">{ex.nome} <span style={{fontSize:'11px',color:'var(--accent2)'}}>📷</span></div>
                <div className="ex-dica">{ex.dica}</div>
                <div className="ex-sets">{ex.series}× {ex.reps.split(',')[0]} reps</div>
              </div>
            </div>
          ))}
        </div>
        <button className="btn btn-p btn-w" onClick={()=>setTreinoModal(tr)}>▶ Iniciar treino</button>
      </div>
    </div>
    {exModal&&<ExModal ex={exModal} onClose={()=>setExModal(null)}/>}
    {treinoModal&&<IniciarTreinoModal treino={treinoModal} usuario={usuario} onClose={()=>setTreinoModal(null)} onSave={()=>{}} showToast={showToast}/>}
  </div>);
}

// HISTÓRICO PAGE
function HistoricoPage({usuario}){
  const [pesagens,setPesagens]=useState([]);
  useEffect(()=>{
    sb.from('pesagens').select('*').eq('usuario_id',usuario.id).order('data',{ascending:false}).limit(30).then(({data})=>setPesagens(data||[]));
  },[]);
  const maxP=Math.max(...pesagens.map(p=>p.peso),0);
  const minP=Math.min(...pesagens.map(p=>p.peso),999);
  const pesoInicial=pesagens[pesagens.length-1]?.peso||usuario.peso_atual;
  const pesoAtual=pesagens[0]?.peso||usuario.peso_atual;
  const diff=(pesoAtual-pesoInicial).toFixed(1);
  return(<div className="page">
    <div className="phdr"><div><div className="phdr-t">Histórico 📊</div><div className="phdr-s">Sua evolução ao longo do tempo</div></div></div>
    <div style={{padding:'0 20px'}}>
      {pesagens.length>1&&<div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}}>
          <div><div style={{fontSize:'11px',color:'var(--text3)',marginBottom:'3px'}}>Evolução do peso</div>
            <div style={{fontFamily:'Syne',fontSize:'26px',fontWeight:800}}>{pesoAtual}<span style={{fontSize:'13px',color:'var(--text3)'}}>kg</span></div>
          </div>
          <span style={{fontSize:'11px',padding:'4px 10px',borderRadius:'20px',fontWeight:600,...(+diff<=0?{background:'rgba(74,222,128,.14)',color:'var(--accent)'}:{background:'rgba(248,113,113,.14)',color:'var(--accent4)'})}}>
            {+diff<=0?'▼':'▲'} {Math.abs(+diff)}kg
          </span>
        </div>
        <div className="mini-chart">
          {pesagens.slice(-12).reverse().map((p,i,arr)=>{
            const range=maxP-minP||1;
            const h=((p.peso-minP)/range)*42+4;
            return<div key={i} className={`mini-bar ${i===arr.length-1?'last':''}`} style={{height:`${h}px`}}/>;
          })}
        </div>
        <div style={{fontSize:'11px',color:'var(--text3)',marginTop:'7px',textAlign:'center'}}>Início: {pesoInicial}kg → Hoje: {pesoAtual}kg · Diferença: {Math.abs(+diff)}kg</div>
      </div>}
      {pesagens.length<=1&&<div className="empty"><span className="empty-ic">📈</span><span className="empty-t">Poucos dados ainda</span><span className="empty-s">Continue registrando seu peso no check-in diário para ver sua evolução aqui.</span></div>}
      <div className="card" style={{marginTop:'10px'}}>
        <div className="ctitle">Últimas pesagens</div>
        {pesagens.slice(0,10).map((p,i)=>(
          <div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 0',borderBottom:i<9?'1px solid var(--border)':'none'}}>
            <span style={{fontSize:'13px',color:'var(--text2)'}}>{new Date(p.data+'T12:00:00').toLocaleDateString('pt-BR',{weekday:'short',day:'2-digit',month:'short'})}</span>
            <span style={{fontSize:'15px',fontWeight:700}}>{p.peso} kg</span>
          </div>
        ))}
      </div>
    </div>
  </div>);
}

// PERFIL PAGE
function PerfilPage({usuario,onLogout}){
  const imcVal=imc(usuario.peso_atual,usuario.altura);
  return(<div className="page">
    <div className="prof-hdr">
      <div className="prof-av">{usuario.nome[0].toUpperCase()}</div>
      <div className="prof-nm">{usuario.nome}</div>
      <div className="prof-stats">
        {[['Peso',`${usuario.peso_atual}kg`],['IMC',imcVal],['Objetivo',usuario.objetivo==='recomposicao'?'Recomp.':usuario.objetivo==='perder'?'Perder':'Ganhar']].map(([l,v])=>(
          <div key={l} className="pstat"><span className="pstat-v">{v}</span><span className="pstat-l">{l}</span></div>
        ))}
      </div>
      <div style={{display:'flex',gap:'7px'}}>
        <span className="pill pill-b">{+imcVal<25?'IMC Normal':'IMC Acima'}</span>
        <span className="pill pill-g">{usuario.objetivo==='recomposicao'?'Recomposição':usuario.objetivo}</span>
      </div>
    </div>
    <div style={{padding:'0 20px'}}>
      <div className="ctitle" style={{marginBottom:'9px'}}>Minhas metas</div>
      {[['🔥','Meta calórica',`${usuario.meta_calorica} kcal/dia`],['💪','Meta proteína',`${usuario.meta_proteina}g/dia`],['👟','Meta passos',`${(usuario.meta_passos||10000).toLocaleString()}/dia`],['💧','Meta água',`${((usuario.meta_agua||4000)/1000).toFixed(1)}L/dia`]].map(([ic,n,v])=>(
        <div key={n} className="pitem"><div className="pitem-l"><div className="pitem-ic">{ic}</div><span className="pitem-n">{n}</span></div><span className="pitem-v">{v}</span></div>
      ))}
      <div className="ctitle" style={{margin:'16px 0 9px'}}>Dados pessoais</div>
      {[['👤','Nome',usuario.nome],['🎂','Idade',`${usuario.idade} anos`],['📏','Altura',`${usuario.altura} cm`],['⚖️','Peso atual',`${usuario.peso_atual} kg`],['🧬','Sexo',usuario.sexo==='M'?'Masculino':'Feminino']].map(([ic,n,v])=>(
        <div key={n} className="pitem"><div className="pitem-l"><div className="pitem-ic">{ic}</div><span className="pitem-n">{n}</span></div><span className="pitem-v">{v}</span></div>
      ))}
      <div style={{marginTop:'20px'}}>
        <button className="btn btn-danger btn-w" onClick={onLogout}>Sair da conta</button>
      </div>
    </div>
  </div>);
}

// APP PRINCIPAL
function App(){
  const [loading,setLoading]=useState(true);
  const [usuario,setUsuario]=useState(null);
  const [tab,setTab]=useState('home');
  const [checkin,setCheckin]=useState(null);
  const [refeicoes,setRefeicoes]=useState([]);
  const [showCheckin,setShowCheckin]=useState(false);
  const [addModal,setAddModal]=useState(null);
  const [toast,setToast]=useState(null);
  const [streak,setStreak]=useState(0);
  const [resumoSemanal,setResumoSemanal]=useState(null);
  const [historicoSemana,setHistoricoSemana]=useState([]);
  const [metabolismoModal,setMetabolismoModal]=useState(null);
  const [pwaPrompt,setPwaPrompt]=useState(null);

  // PWA install prompt
  useEffect(()=>{
    const handler=e=>{e.preventDefault();setPwaPrompt(e);};
    window.addEventListener('beforeinstallprompt',handler);
    return()=>window.removeEventListener('beforeinstallprompt',handler);
  },[]);

  const showToast=(msg,type='s')=>{setToast({msg,type});setTimeout(()=>setToast(null),3000);};

  const carregar=useCallback(async uid=>{
    const{data:u}=await sb.from('usuarios').select('*').eq('id',uid).single();
    if(!u){localStorage.removeItem('evolua_uid');setLoading(false);return;}
    setUsuario(u);
    const[{data:ci},{data:refs}]=await Promise.all([
      sb.from('checkins_diarios').select('*').eq('usuario_id',uid).eq('data',hoje()).single(),
      sb.from('refeicoes').select('*').eq('usuario_id',uid).eq('data',hoje()),
    ]);
    setCheckin(ci||null);
    setRefeicoes(refs||[]);

    // Dados extras: checkins semana, streak, resumo
    const dataInicio=new Date();dataInicio.setDate(dataInicio.getDate()-7);
    const dataInicioStr=dataInicio.toISOString().split('T')[0];
    const[{data:cks7},{data:refs7},{data:treinos7}]=await Promise.all([
      sb.from('checkins_diarios').select('*').eq('usuario_id',uid).gte('data',dataInicioStr).order('data',{ascending:false}),
      sb.from('refeicoes').select('data,calorias_total,proteina_total').eq('usuario_id',uid).gte('data',dataInicioStr),
      sb.from('treinos').select('data').eq('usuario_id',uid).gte('data',dataInicioStr),
    ]);

    // Montar histórico da semana
    const hist=(cks7||[]).map(c=>{
      const refsD=(refs7||[]).filter(r=>r.data===c.data);
      return{
        data:c.data,
        cal:refsD.reduce((s,r)=>s+(r.calorias_total||0),0),
        prot:refsD.reduce((s,r)=>s+(r.proteina_total||0),0),
        passos:c.passos||0,
        treino:!!(treinos7||[]).find(t=>t.data===c.data),
      };
    });
    setHistoricoSemana(hist);

    // Streak
    setStreak(calcStreak(cks7||[]));

    // Resumo semanal (só domingo)
    if(new Date().getDay()===0&&hist.length>=3){
      setResumoSemanal(gerarResumoSemanal(hist,u));
    }

    if(!ci)setTimeout(()=>setShowCheckin(true),700);
    setLoading(false);
  },[]);

  useEffect(()=>{
    const uid=localStorage.getItem('evolua_uid');
    if(uid)carregar(uid);else setLoading(false);
  },[]);

  const refresh=()=>{if(usuario)carregar(usuario.id);};

  const handleAdd=tipo=>{
    setAddModal(null);
    setTimeout(()=>{
      if(tipo==='passos')setAddModal('passos');
      else if(tipo==='evento')setAddModal('evento');
      else if(tipo==='bebida')setAddModal({tipo:'alimento',subtipo:'bebida'});
      else if(tipo==='refeicao')setAddModal({tipo:'alimento',subtipo:'almoco'});
      else if(tipo==='treino')setAddModal('treino_dia');
      else if(tipo==='cigarro')setShowCheckin(true);
    },120);
  };

  if(loading)return<div className="app"><div className="loading"><div className="loading-logo">Evolua</div><div className="spinner"/><div style={{fontSize:'13px',color:'var(--text3)'}}>Carregando...</div></div></div>;
  if(!usuario)return<div className="app"><Onboarding onComplete={u=>{setUsuario(u);carregar(u.id);}}/></div>;

  const navs=[{id:'home',ic:'🏠',l:'Início'},{id:'treinos',ic:'🏋️',l:'Treino'},null,{id:'historico',ic:'📊',l:'Histórico'},{id:'perfil',ic:'👤',l:'Perfil'}];

  return<div className="app">
    {toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
    <div className="main">
      {tab==='home'&&<Dashboard usuario={usuario} checkin={checkin} refeicoes={refeicoes} refresh={refresh} showToast={showToast} streak={streak} resumoSemanal={resumoSemanal} historicoSemana={historicoSemana} pwaPrompt={pwaPrompt}/>}
      {tab==='treinos'&&<TreinosPage usuario={usuario} showToast={showToast}/>}
      {tab==='historico'&&<HistoricoPage usuario={usuario}/>}
      {tab==='perfil'&&<PerfilPage usuario={usuario} onLogout={()=>{localStorage.removeItem('evolua_uid');setUsuario(null);}}/>}
    </div>
    <nav className="bnav">
      {navs.map((n,i)=>n===null
        ?<div key="add" className="ni ni-c"><button className="nadd" onClick={()=>setAddModal('menu')}>+</button></div>
        :<button key={n.id} className={`ni ${tab===n.id?'active':''}`} onClick={()=>setTab(n.id)}>
          <span className="ico">{n.ic}</span><span className="lbl">{n.l}</span>
        </button>
      )}
    </nav>
    {showCheckin&&<CheckinModal usuario={usuario} onClose={()=>setShowCheckin(false)}
      onSave={()=>{refresh();showToast('Check-in salvo! ☀️');}}
      onMetabolismo={(sug)=>{setMetabolismoModal(sug);setShowCheckin(false);}}/>}
    {metabolismoModal&&<MetabolismoModal
      sugestao={metabolismoModal} usuario={usuario}
      onAceitar={(cal,prot)=>{
        setUsuario(u=>({...u,meta_calorica:cal,meta_proteina:prot}));
        setMetabolismoModal(null);
        refresh();
        showToast('Metas atualizadas! 🧠');
      }}
      onRecusar={()=>setMetabolismoModal(null)}/>}
    {addModal==='menu'&&<AddMenu onClose={()=>setAddModal(null)} onSelect={handleAdd}/>}
    {addModal==='treino_dia'&&<TreinoDiaModal usuario={usuario} onClose={()=>setAddModal(null)} onSave={()=>{refresh();showToast('Treino registrado! 💪');}} showToast={showToast}/>}
    {addModal==='passos'&&<PassosModal usuario={usuario} checkin={checkin} onClose={()=>setAddModal(null)} onSave={()=>{refresh();showToast('Passos atualizados! 👟');}}/>}
    {addModal==='evento'&&<EventoModal usuario={usuario} onClose={()=>setAddModal(null)} onSave={refresh} showToast={showToast}/>}
    {addModal?.tipo==='alimento'&&<AddAlimentoModal usuario={usuario} tipo={addModal.subtipo} onClose={()=>setAddModal(null)} onSave={()=>{refresh();showToast('Adicionado! 🍽️');}} showToast={showToast}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
